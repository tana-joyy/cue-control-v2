<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cue Control — 幾何學大師考驗 (CSS Grid RWD)</title>
    <style>
        body {
            background-color: #F8F9FA;
            color: #2A3630;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            user-select: none;
            /* overflow: hidden;  <--- 把這一行刪除或註冊掉 */
        }

        /* 響應式主容器 */
        #game-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            box-sizing: border-box;
            transition: max-width 0.3s ease;
        }

        /* 核心：高質感控制台 */
        #dashboard {
            background-color: #F4EFEA;
            /* 淺橡木色偏乳白 */
            border: 2px solid #E3DBD3;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            box-sizing: border-box;
        }

        h1 {
            color: #2A3630;
            font-weight: 700;
            margin: 0;
        }

        #level-title {
            font-weight: bold;
            color: #5A6960;
        }

        #rule-text {
            color: #B57C1E;
            /* 質感琥珀金 */
            font-weight: 500;
            line-height: 1.4;
            margin: 0;
        }

        #nav-container {
            display: flex;
            gap: 4px;
        }

        .nav-btn {
            background-color: #FFFFFF;
            color: #2A3630;
            border: 1px solid #C5BCB4;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 500;
        }

        .nav-btn:hover {
            background-color: #8A9A86;
            color: #FFFFFF;
            border-color: #8A9A86;
        }

        #restartBtn {
            background-color: #F1ECE6;
            border-color: #D5C9BE;
            color: #8B6E53;
        }

        #restartBtn:hover {
            background-color: #8B6E53;
            color: #FFFFFF;
            border-color: #8B6E53;
        }

        #msg-box {
            background-color: #FFFFFF;
            border: 1px solid #EBE6E0;
            border-left: 4px solid #8A9A86;
            /* 侘寂苔綠 */
            color: #2A3630;
            font-weight: bold;
            text-align: center;
            border-radius: 4px;
            box-sizing: border-box;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            background-color: #3B5947;
            /* 高級莫斯綠 */
            border: 12px solid #8B6E53;
            /* 原木色邊框 */
            border-radius: 0 0 8px 8px;
            box-shadow: 0 12px 28px rgba(139, 110, 83, 0.12);
            cursor: crosshair;
            width: 100%;
            height: auto;
            box-sizing: border-box;
            touch-action: none;
        }

        /* =========================================================
           🛠️ 響應式魔法：使用 CSS Grid 在不同斷點徹底重排結構
           ========================================================= */

        /* 📱 需求 2：768px 以下 (手機平板直式) ➔ 完美重現圖片排版 */
        @media (max-width: 768px) {
            #game-layout {
                max-width: 424px;
            }

            #dashboard {
                display: grid;
                grid-template-columns: 1fr auto;
                gap: 6px 0;
                /* <--- 從 10px 縮小到 6px，減少折行後的間距 */
                padding: 12px;
                /* <--- 從 14px 稍微縮小到 12px */
            }

            h1 {
                grid-column: 1;
                grid-row: 1;
                font-size: 18px;
                align-self: center;
            }

            #nav-container {
                grid-column: 2;
                grid-row: 1;
                align-self: center;
            }

            #level-title {
                grid-column: 1 / span 2;
                grid-row: 2;
                font-size: 14px;
                margin-top: 2px;
            }

            #rule-text {
                grid-column: 1 / span 2;
                grid-row: 3;
                font-size: 13px;
                line-height: 1.3;
            }

            #msg-box {
                grid-column: 1 / span 2;
                grid-row: 4;
                width: 100%;
                font-size: 13px;
                padding: 8px;
                /* <--- 從 10px 縮小到 8px */
                border-radius: 4px;
            }

            #nav-container {
                grid-column: 2;
                grid-row: 1;
                align-self: center;
            }

            #level-title {
                grid-column: 1 / span 2;
                grid-row: 2;
                font-size: 14px;
                margin-top: 4px;
            }

            #rule-text {
                grid-column: 1 / span 2;
                grid-row: 3;
                font-size: 13px;
            }

            #msg-box {
                grid-column: 1 / span 2;
                grid-row: 4;
                width: 100%;
                font-size: 13px;
                padding: 10px;
                border-radius: 4px;
            }
        }

        /* 💻 需求 2：769px 以上 (桌機大螢幕橫式) ➔ 恢復左右分流排版 */
        @media (min-width: 769px) {
            #game-layout {
                max-width: 824px;
            }

            #dashboard {
                display: grid;
                grid-template-columns: 1fr auto;
                /* 左側資訊，右側控制區 */
                gap: 4px 16px;
                padding: 14px 18px;
            }

            h1 {
                grid-column: 1;
                grid-row: 1;
                font-size: 22px;
            }

            #level-title {
                grid-column: 1;
                grid-row: 2;
                font-size: 14px;
            }

            #rule-text {
                grid-column: 1;
                grid-row: 3;
                font-size: 13px;
            }

            #nav-container {
                grid-column: 2;
                grid-row: 1;
                justify-self: end;
            }

            #msg-box {
                grid-column: 2;
                grid-row: 2 / span 2;
                /* 縱向跨越兩行，與左側對齊 */
                justify-self: end;
                align-self: center;
                min-width: 280px;
                padding: 8px 14px;
                border-radius: 0 4px 4px 0;
                border-top: 1px solid #EBE6E0;
                border-right: 1px solid #EBE6E0;
                border-bottom: 1px solid #EBE6E0;
            }
        }
    </style>
</head>

<body>

    <div id="game-layout">
        <div id="dashboard">
            <h1>🎯 Cue Control</h1>

            <div id="nav-container">
                <button class="nav-btn" id="prevBtn">⬅️ 上一關</button>
                <button class="nav-btn" id="restartBtn">🔄 重來</button>
                <button class="nav-btn" id="nextBtn">下一關 ➡️</button>
            </div>

            <div id="level-title">載入中...</div>
            <div id="rule-text">載入中...</div>
            <div id="msg-box">系統準備就緒</div>
        </div>

        <canvas id="poolCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('poolCanvas');
        const ctx = canvas.getContext('2d');
        const gameLayout = document.getElementById('game-layout');
        const msgBox = document.getElementById('msg-box');
        const levelTitle = document.getElementById('level-title');
        const ruleText = document.getElementById('rule-text');
        const prevBtn = document.getElementById('prevBtn');
        const restartBtn = document.getElementById('restartBtn');
        const nextBtn = document.getElementById('nextBtn');

        let currentLevel = 1;
        let currentMode = '';
        let isDragging = false;
        let isTransitioning = false;
        let firstCollisionWith = null;
        let bounceCount = 0;

        let isShotActive = false;
        let hasTouchedBallThisTurn = false;
        let hitWallBeforeBall = false;

        const friction = 0.985;
        let maxPowerDist = 110;

        let pockets = [];
        let balls = [];
        let cueBall = null;

        class Ball {
            constructor(x, y, r, color, label, id) {
                this.x = x; this.y = y; this.r = r;
                this.color = color; this.label = label; this.id = id;
                this.vx = 0; this.vy = 0;
                this.isPocketed = false;
            }
            draw() {
                if (this.isPocketed) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();

                if (this.label) {
                    ctx.fillStyle = this.color === '#FFFFFF' || this.color === '#FFD166' ? '#2A3630' : '#FFFFFF';
                    ctx.font = 'bold 11px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.label, this.x, this.y);
                }
            }
            update() {
                if (this.isPocketed) return;
                this.vx *= friction;
                this.vy *= friction;
                if (Math.abs(this.vx) < 0.05) this.vx = 0;
                if (Math.abs(this.vy) < 0.05) this.vy = 0;
                this.x += this.vx;
                this.y += this.vy;

                let hitWall = false;
                if (this.x < this.r) { this.x = this.r; this.vx *= -1; hitWall = true; }
                if (this.x > canvas.width - this.r) { this.x = canvas.width - this.r; this.vx *= -1; hitWall = true; }
                if (this.y < this.r) { this.y = this.r; this.vy *= -1; hitWall = true; }
                if (this.y > canvas.height - this.r) { this.y = canvas.height - this.r; this.vy *= -1; hitWall = true; }

                if (this.id === 'cue' && hitWall && (Math.abs(this.vx) > 0.1 || Math.abs(this.vy) > 0.1)) {
                    bounceCount++;
                    if (!hasTouchedBallThisTurn) {
                        hitWallBeforeBall = true;
                    }
                }

                pockets.forEach(p => {
                    let dist = Math.hypot(this.x - p.x, this.y - p.y);
                    if (dist < p.r) {
                        this.isPocketed = true;
                        this.vx = 0; this.vy = 0;
                    }
                });
            }
        }

        function updateResponsiveLayout() {
            let mode = window.innerWidth <= 768 ? 'vertical' : 'horizontal';

            if (mode !== currentMode) {
                currentMode = mode;
                if (mode === 'horizontal') {
                    canvas.width = 800;
                    canvas.height = 400;
                    maxPowerDist = 110;
                } else {
                    canvas.width = 400;
                    canvas.height = 600;
                    maxPowerDist = 90;
                }
                initLevel(currentLevel);
            }
        }

        function initLevel(level) {
            currentLevel = level;
            isDragging = false;
            isTransitioning = false;
            isShotActive = false;
            hasTouchedBallThisTurn = false;
            hitWallBeforeBall = false;
            firstCollisionWith = null;
            bounceCount = 0;
            msgBox.style.borderColor = '#8A9A86';
            msgBox.style.color = '#2A3630';

            // ➔ 修正符合圖片規格的初始提示字
            msgBox.innerText = "按住白球向後拉，放開即可擊球";

            prevBtn.style.visibility = (level === 1) ? 'hidden' : 'visible';
            nextBtn.style.visibility = (level === 3) ? 'hidden' : 'visible';

            pockets = [];
            if (currentMode === 'horizontal') {
                pockets.push(
                    { x: 0, y: 0, r: 24 }, { x: 400, y: 0, r: 21 }, { x: 800, y: 0, r: 24 },
                    { x: 0, y: 400, r: 24 }, { x: 400, y: 400, r: 21 }, { x: 800, y: 400, r: 24 }
                );
            } else {
                pockets.push(
                    { x: 0, y: 0, r: 22 }, { x: 400, y: 0, r: 22 },
                    { x: 0, y: 300, r: 19 }, { x: 400, y: 300, r: 19 },
                    { x: 0, y: 600, r: 22 }, { x: 400, y: 600, r: 22 }
                );
            }

            if (currentMode === 'horizontal') {
                /* 💻 橫式模式 — 白球放在球桌畫面右方 */
                if (level === 1) {
                    levelTitle.innerText = "關卡 1：基礎擊球與防止白球進袋";
                    ruleText.innerText = "規則：將紅球打進底部的洞。白球不能先進洞，且不能先撞牆或打空桿！";
                    cueBall = new Ball(600, 200, 14, '#FFFFFF', '', 'cue');
                    balls = [cueBall, new Ball(300, 100, 14, '#E65F5C', '3', 'red')];
                } else if (level === 2) {
                    levelTitle.innerText = "關卡 2：進階規則 — 必須依數字順序進球";
                    ruleText.innerText = "規則：第一下必須先撞到 1 號黃球。1 號還在場上時，不能先碰到或打進 8 號！";
                    cueBall = new Ball(600, 200, 14, '#FFFFFF', '', 'cue');
                    balls = [
                        cueBall,
                        new Ball(300, 150, 14, '#FFD166', '1', 'target'),
                        new Ball(350, 250, 14, '#2D3142', '8', 'obstacle')
                    ];
                } else if (level === 3) {
                    levelTitle.innerText = "關卡 3：終極考驗 — 幾何學兩顆星反彈擊球";
                    ruleText.innerText = "規則：正中央有大紅球擋路。你必須利用上下牆壁反彈「2次以上」繞過去打進藍色 9 號球！";
                    cueBall = new Ball(600, 200, 14, '#FFFFFF', '', 'cue');
                    balls = [
                        cueBall,
                        new Ball(400, 200, 42, '#E65F5C', '⚠️ 障礙', 'obstacle'),
                        new Ball(200, 200, 14, '#247BA0', '9', 'target')
                    ];
                }
            } else {
                /* 📱 直式模式 — 白球放在球桌畫面下方 */
                if (level === 1) {
                    // ➔ 修正符合圖片規格的關卡與規則文字
                    levelTitle.innerText = "關卡 1：基礎擊球與防止白球進袋";
                    ruleText.innerText = "規則：將紅球打進底部的洞。白球不能先進洞，且不能先撞牆或打空桿！";
                    cueBall = new Ball(200, 400, 14, '#FFFFFF', '', 'cue');
                    balls = [cueBall, new Ball(100, 200, 14, '#E65F5C', '3', 'red')];
                } else if (level === 2) {
                    levelTitle.innerText = "關卡 2：進階規則 — 必須依數字順序進球";
                    ruleText.innerText = "規則：第一下必須先撞到 1 號黃球。1 號還在場上時，不能先碰到或先打進 8 號！";
                    cueBall = new Ball(200, 450, 14, '#FFFFFF', '', 'cue');
                    balls = [
                        cueBall,
                        new Ball(150, 220, 14, '#FFD166', '1', 'target'),
                        new Ball(250, 220, 14, '#2D3142', '8', 'obstacle')
                    ];
                } else if (level === 3) {
                    levelTitle.innerText = "關卡 3：終極考驗 — 幾何學兩顆星反彈擊球";
                    ruleText.innerText = "規則：正中央有超大障礙球擋路。你必須利用左右牆壁反彈「2次以上\"繞過去打進藍色 9 號球！";
                    cueBall = new Ball(200, 480, 14, '#FFFFFF', '', 'cue');
                    balls = [
                        cueBall,
                        new Ball(200, 300, 40, '#E65F5C', '⚠️ 障礙', 'obstacle'),
                        new Ball(200, 120, 14, '#247BA0', '9', 'target')
                    ];
                }
            }
        }

        function handleCollision(b1, b2) {
            if (b1.isPocketed || b2.isPocketed) return;
            let dx = b2.x - b1.x;
            let dy = b2.y - b1.y;
            let dist = Math.hypot(dx, dy);

            if (dist < b1.r + b2.r) {
                if (b1.id === 'cue' || b2.id === 'cue') {
                    hasTouchedBallThisTurn = true;
                }
                if (b1.id === 'cue' && !firstCollisionWith) firstCollisionWith = b2.id;
                if (b2.id === 'cue' && !firstCollisionWith) firstCollisionWith = b1.id;

                let overlap = (b1.r + b2.r) - dist;
                let nx = dx / dist; let ny = dy / dist;
                b1.x -= nx * overlap / 2; b1.y -= ny * overlap / 2;
                b2.x += nx * overlap / 2; b2.y += ny * overlap / 2;

                let kx = b1.vx - b2.vx; let ky = b1.vy - b2.vy;
                let p = 2 * (nx * kx + ny * ky) / 2;
                b1.vx -= p * nx; b1.vy -= p * ny;
                b2.vx += p * nx; b2.vy += p * ny;
            }
        }

        function getMousePos(e) {
            let rect = canvas.getBoundingClientRect();
            let scaleX = canvas.width / rect.width;
            let scaleY = canvas.height / rect.height;

            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else if (e.changedTouches && e.changedTouches.length > 0) {
                clientX = e.changedTouches[0].clientX;
                clientY = e.changedTouches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        let mouse = { x: 0, y: 0 };

        function onStart(e) {
            if (cueBall.vx !== 0 || cueBall.vy !== 0 || cueBall.isPocketed || isTransitioning) return;
            let pos = getMousePos(e);
            if (Math.hypot(pos.x - cueBall.x, pos.y - cueBall.y) < cueBall.r + 22) {
                isDragging = true;
                mouse = pos;
                if (e.cancelable) e.preventDefault();
            }
        }

        function onMove(e) {
            if (!isDragging) return;
            mouse = getMousePos(e);
            if (e.cancelable) e.preventDefault();
        }

        function onEnd() {
            if (isDragging) {
                let dx = cueBall.x - mouse.x;
                let dy = cueBall.y - mouse.y;
                let dist = Math.hypot(dx, dy);

                if (dist > maxPowerDist) {
                    dx = (dx / dist) * maxPowerDist;
                    dy = (dy / dist) * maxPowerDist;
                }

                firstCollisionWith = null;
                bounceCount = 0;
                hasTouchedBallThisTurn = false;
                hitWallBeforeBall = false;
                isShotActive = true;

                cueBall.vx = dx * 0.12;
                cueBall.vy = dy * 0.12;
                isDragging = false;
            }
        }

        canvas.addEventListener('mousedown', onStart);
        canvas.addEventListener('touchstart', onStart, { passive: false });
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchend', onEnd);

        prevBtn.addEventListener('click', () => { if (currentLevel > 1) initLevel(currentLevel - 1); });
        restartBtn.addEventListener('click', () => { initLevel(currentLevel); });
        nextBtn.addEventListener('click', () => { if (currentLevel < 3) initLevel(currentLevel + 1); });

        function checkGameRules() {
            if (isTransitioning) return;

            let allStopped = balls.every(b => b.vx === 0 && b.vy === 0);
            if (!allStopped) return;

            if (isShotActive) {
                isShotActive = false;

                if (currentLevel === 1 || currentLevel === 2) {
                    if (hitWallBeforeBall) {
                        isTransitioning = true;
                        msgBox.style.borderColor = '#E65F5C';
                        msgBox.style.color = '#E65F5C';
                        msgBox.innerText = "❌ 犯規！出桿後不能先撞到牆壁！";
                        setTimeout(() => initLevel(currentLevel), 2500);
                        return;
                    }
                    if (!hasTouchedBallThisTurn) {
                        isTransitioning = true;
                        msgBox.style.borderColor = '#E65F5C';
                        msgBox.style.color = '#E65F5C';
                        msgBox.innerText = "❌ 犯規！空桿未碰到任何球！";
                        setTimeout(() => initLevel(currentLevel), 2500);
                        return;
                    }
                }
            }

            if (cueBall.isPocketed) {
                isTransitioning = true;
                msgBox.style.borderColor = '#E65F5C';
                msgBox.style.color = '#E65F5C';
                msgBox.innerText = "❌ 犯規！白球掉進洞了！";
                setTimeout(() => initLevel(currentLevel), 2000);
                return;
            }

            if (currentLevel === 1) {
                if (balls.find(b => b.id === 'red').isPocketed) {
                    isTransitioning = true;
                    msgBox.style.borderColor = '#8A9A86';
                    msgBox.style.color = '#8A9A86';
                    msgBox.innerText = "🎉 太棒了！2 秒後進入下一關。";
                    setTimeout(() => initLevel(2), 2000);
                }
            } else if (currentLevel === 2) {
                let oneBall = balls.find(b => b.id === 'target');
                let obstacleBall = balls.find(b => b.id === 'obstacle');

                if (!oneBall.isPocketed) {
                    if (firstCollisionWith === 'obstacle') {
                        isTransitioning = true;
                        msgBox.style.borderColor = '#E65F5C';
                        msgBox.style.color = '#E65F5C';
                        msgBox.innerText = "❌ 犯規！1 號球還在，不能先碰 8 號！";
                        setTimeout(() => initLevel(2), 2000);
                    } else if (obstacleBall.isPocketed) {
                        isTransitioning = true;
                        msgBox.style.borderColor = '#E65F5C';
                        msgBox.style.color = '#E65F5C';
                        msgBox.innerText = "❌ 犯規！順序錯誤，不能先打進 8 號！";
                        setTimeout(() => initLevel(2), 2000);
                    } else {
                        msgBox.style.borderColor = '#ffcc00';
                        msgBox.style.color = '#B57C1E';
                        msgBox.innerText = "⚡️ 1 號球還在場上，請繼續瞄準 1 號！";
                    }
                } else {
                    if (!obstacleBall.isPocketed) {
                        msgBox.style.borderColor = '#8A9A86';
                        msgBox.style.color = '#8A9A86';
                        msgBox.innerText = "🎯 漂亮！1 號已清除，接下來請打進 8 號球！";
                    } else {
                        isTransitioning = true;
                        msgBox.style.borderColor = '#8A9A86';
                        msgBox.style.color = '#8A9A86';
                        msgBox.innerText = "🎉 挑戰成功！2 秒後解鎖極致第三關！";
                        setTimeout(() => initLevel(3), 2000);
                    }
                }
            } else if (currentLevel === 3) {
                let nineBall = balls.find(b => b.id === 'target');

                if (firstCollisionWith === 'obstacle') {
                    isTransitioning = true;
                    msgBox.style.borderColor = '#E65F5C';
                    msgBox.style.color = '#E65F5C';
                    msgBox.innerText = "❌ 碰到了紅色障礙球，犯規重來！";
                    setTimeout(() => initLevel(3), 2000);
                } else if (nineBall.isPocketed) {
                    if (bounceCount >= 2) {
                        isTransitioning = true;
                        msgBox.style.borderColor = '#8A9A86';
                        msgBox.style.color = '#8A9A86';
                        msgBox.innerText = `🏆 神乎其技！反彈 ${bounceCount} 次擊落！幾何學大師！`;
                    } else {
                        isTransitioning = true;
                        msgBox.style.borderColor = '#B57C1E';
                        msgBox.style.color = '#B57C1E';
                        msgBox.innerText = `⚠️ 球進了，但只反彈了 ${bounceCount} 次！未達 2 次標準。`;
                        setTimeout(() => initLevel(3), 2500);
                    }
                }
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            pockets.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = '#222B26';
                ctx.fill();
                ctx.closePath();
            });

            balls.forEach(b => b.update());

            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    handleCollision(balls[i], balls[j]);
                }
            }

            balls.forEach(b => b.draw());

            if (isDragging) {
                ctx.beginPath();
                ctx.moveTo(cueBall.x, cueBall.y);

                let dx = cueBall.x - mouse.x;
                let dy = cueBall.y - mouse.y;
                let dist = Math.hypot(dx, dy);

                if (dist > maxPowerDist) {
                    dx = (dx / dist) * maxPowerDist;
                    dy = (dy / dist) * maxPowerDist;
                }

                let targetX = cueBall.x + dx;
                let targetY = cueBall.y + dy;

                ctx.lineTo(targetX, targetY);
                ctx.strokeStyle = 'rgba(42, 54, 48, 0.4)';
                ctx.lineWidth = 2.5;
                ctx.setLineDash([6, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.closePath();
            }

            checkGameRules();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', updateResponsiveLayout);

        updateResponsiveLayout();
        gameLoop();
    </script>
</body>
